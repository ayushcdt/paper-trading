name: Daily Heartbeat

# Single purpose: prove the cloud cron infra is alive.
# Fires every weekday 08:25 IST = 02:55 UTC, posts a 1-liner to Telegram.
# If a heartbeat is missing on a market day, the user knows IMMEDIATELY
# (without waiting for a missing trade or daily summary) that something
# is broken and must ping Claude. This is the fix for the May 4-26
# silent-failure blackout where local crons died unnoticed for 19 days.

on:
  schedule:
    - cron: "55 2 * * 1-5"   # 02:55 UTC = 08:25 IST, Mon-Fri
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Telegram heartbeat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE_IST=$(TZ=Asia/Kolkata date '+%a %d %b %Y %H:%M IST')
          MSG="ARTHA HEARTBEAT OK - $DATE_IST - GitHub Actions cron alive"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MSG" \
            -o /dev/null -w 'status=%{http_code}\n'
